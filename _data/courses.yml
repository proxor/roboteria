- id: "261-6223-A"
  title_de: "Roboteria: Club-Workshops"
  title_en: "Roboteria: Club Workshops"
  status: "planned"
  registration_opens: "01.08.2026"
  meta:
    date_de: "Geplant im November 2026, 6 x 90 Min."
    date_en: "Planned for Nov 2026, 6 x 90 min."
    age_de: "für neugierige Coder von 8 bis 12 Jahren"
    age_en: "for curious coders aged 8 to 12"
    size_de: "Max. Teilnehmerzahl: 8"
    size_en: "Max participants: 8"
  description_de: "Du hast erste Schritte in der Programmierung gemeistert und bist bereit, die vollen Moeglichkeiten des micro:bit zu entdecken? Diese Workshopreihe ist perfekt für alle, die bereits erste Erfahrungen mit Plattformen wie micro:bit, Calliope Mini, Scratch oder aehnlichen gesammelt haben und von der Technologie begeistert sind. In spannenden, thematischen Workshops entdecken wir gemeinsam, wie du weitere Funktionen des BBC micro:bit nutzt. Wir passen die Projekte flexibel an die Interessen und den Wissensstand der Gruppe an."
  description_en: "You have already taken your first steps in programming and are ready to explore the full potential of the micro:bit? This workshop series is perfect for kids who have some experience with platforms like micro:bit, Calliope Mini, Scratch, or similar tools. Together we explore new micro:bit features and adapt projects to the group's interests and experience."

- id: "261-6222-A"
  title_de: "Roboteria: Anfaengerkurs – Dein Start in die Tech-Welt"
  title_en: "Roboteria: Beginner Course - Your Start in Tech"
  status: "planned"
  registration_opens: "01.08.2026"
  meta:
    date_de: "Geplant im September 2026, 6 x 90 Min."
    date_en: "Planned for Sep 2026, 6 x 90 min."
    age_de: "für neugierige Coder von 8 bis 12 Jahren"
    age_en: "for curious coders aged 8 to 12"
    size_de: "Max. Teilnehmerzahl: 8"
    size_en: "Max participants: 8"
  description_de: "Du lernst den micro:bit kennen - einen kleinen, aber maechtigen Computer in der Groesse deiner Handflaeche. Wir bauen gemeinsam coole Projekte: einen leuchtenden Kompass, einen digitalen Schrittzaehler, eine kleine Musikbox oder sogar dein eigenes elektronisches Spiel. Keine Vorkenntnisse nötig: Wir starten bei Null."
  description_en: "Meet the micro:bit - a small but powerful computer in the palm of your hand. We build fun projects together: a glowing compass, a step counter, a small music box, or even your own electronic game. No prior experience needed."

