  description_de: "Werde zum Tech-Agenten in nur 120 Minuten! Du programmierst einen Minicomputer, baust eine echte Alarmanlage und jagst am Ende einen versteckten Sender durch den Raum. Jeder Absolvent erhaelt sein offizielles Agenten-Zertifikat."
